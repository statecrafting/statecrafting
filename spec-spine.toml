# spec-spine.toml governs this repository. All keys are optional; an
# absent file behaves as the defaults for a single-Cargo-workspace repo.

[manifest]
metadata_namespace = "spec-spine"

[domains]
allowed = []   # empty: the `domain` field is free-text / disabled

[kind]
allowed = []   # empty: the `kind` field is free-text / disabled

[layout]
specs_dir     = "specs"
derived_dir   = ".derived"
standards_dir = "standards/spec"
# Each package is appended as its own spec lands it (spec 001 section 5, the
# migration ladder). The toolchain (spec 002) is the first to arrive: its meta
# package plus three per-platform binary packages. It is npm-only here; the
# Rust it builds lives in vendor/encore, which is upstream Encore's own cargo
# workspace (MPL-2.0) and is not a package we publish. The napi-rs crates
# arrive with specs 003 through 006.
standalone_rust_workspaces = [
  "addon/hiqlite-native",
  "addon/kernel-native",
]
standalone_npm_packages    = [
  "packages/toolchain",
  "packages/toolchain-darwin-arm64",
  "packages/toolchain-linux-x64",
  "packages/toolchain-linux-arm64",
  "addon/hiqlite-native",
  "addon/kernel-native",
]

[index]
# Governance surfaces beyond the always-hashed core. Package manifests are
# added as packages arrive.
extra_hashed_inputs = [
  "standards/**",
  ".github/workflows/**",
  ".claude/rules/**",
]

[coupling]
waiver_keyword = "Spec-Drift-Waiver:"
bypass_prefixes = ["**/README.md"]
