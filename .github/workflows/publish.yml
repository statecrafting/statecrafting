# Publish the toolchain (spec 002): builds the per-platform native binaries
# and publishes the @statecrafting/* packages on a version tag.
#
#   @statecrafting/toolchain            (drivers; meta package, no binary)
#   @statecrafting/toolchain-<platform> (encore-runtime.node + tsparser-encore)
#
# The matrix is the spec 002 platform set (darwin-arm64, linux-x64,
# linux-arm64). Each leg builds and publishes its own platform package
# natively: the binaries cannot be cross-compiled from one host, which is why
# publishing is CI-only by construction. One designated leg additionally
# publishes the meta package.
#
# The hiqlite-native legs join this matrix with spec 003, the kernel-native
# legs with spec 004.
name: publish
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
permissions:
  contents: read
  id-token: write # npm provenance
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false
jobs:
  build-and-publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-14
            triple: darwin-arm64
            napi_triple: darwin-arm64
            publish_meta: true
          - platform: linux-x64
            runner: ubuntu-24.04
            triple: linux-x64
            napi_triple: linux-x64-gnu
            publish_meta: false
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            triple: linux-arm64
            napi_triple: linux-arm64-gnu
            publish_meta: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Install protoc + cmake (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -y -q protobuf-compiler cmake
      - name: Install protoc + cmake (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf cmake
      - run: npm ci

      # --- toolchain native binaries -> @statecrafting/toolchain-<platform> --
      - name: Build vendored Encore runtime + tsparser
        run: npm run build:runtime
      - name: Assemble the toolchain platform package
        run: |
          dst="packages/toolchain-${{ matrix.triple }}"
          cp vendor/encore/target/release/encore-runtime.node "$dst/"
          cp vendor/encore/target/release/tsparser-encore "$dst/"
      - name: Publish @statecrafting/toolchain-${{ matrix.triple }}
        working-directory: packages/toolchain-${{ matrix.triple }}
        # Idempotent (spec 002 versioning): the @statecrafting/* packages track
        # their own semver, so a tag that does not bump them must not fail.
        # Publish only when this exact version is not already on npm.
        run: |
          pkg=$(node -p "require('./package.json').name")
          ver=$(node -p "require('./package.json').version")
          if npm view "$pkg@$ver" version 2>/dev/null | grep -q .; then
            echo "$pkg@$ver already on npm; skipping publish"
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # --- toolchain meta package (one leg only) ----------------------------
      - name: Publish @statecrafting/toolchain (meta)
        if: matrix.publish_meta
        working-directory: packages/toolchain
        # Idempotent: skip if this exact version is already on npm (spec 002).
        run: |
          pkg=$(node -p "require('./package.json').name")
          ver=$(node -p "require('./package.json').version")
          if npm view "$pkg@$ver" version 2>/dev/null | grep -q .; then
            echo "$pkg@$ver already on npm; skipping publish"
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # --- hiqlite-native addon -> @statecrafting/hiqlite-native-<triple> ----
      # (spec 003) napi-rs addon; the platform package dirs are generated by
      # napi create-npm-dirs, not committed. Build natively per platform.
      - run: npm --prefix addon/hiqlite-native ci
      - name: Build hiqlite-native addon
        run: npm --prefix addon/hiqlite-native run build
      - name: Assemble the addon platform package
        run: |
          npm --prefix addon/hiqlite-native run create-npm-dirs
          cp addon/hiqlite-native/hiqlite-native.${{ matrix.napi_triple }}.node \
             addon/hiqlite-native/npm/${{ matrix.napi_triple }}/
          # npm always ships a LICENSE file even if absent from `files`.
          cp addon/hiqlite-native/LICENSE \
             addon/hiqlite-native/npm/${{ matrix.napi_triple }}/
      - name: Publish @statecrafting/hiqlite-native-${{ matrix.napi_triple }}
        working-directory: addon/hiqlite-native/npm/${{ matrix.napi_triple }}
        # Idempotent: skip if this exact version is already on npm (spec 003).
        run: |
          pkg=$(node -p "require('./package.json').name")
          ver=$(node -p "require('./package.json').version")
          if npm view "$pkg@$ver" version 2>/dev/null | grep -q .; then
            echo "$pkg@$ver already on npm; skipping publish"
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # --- hiqlite-native meta package (one leg only) -----------------------
      # The platform optionalDependencies are injected at publish time, not
      # committed, so addon/hiqlite-native/package-lock.json stays stable
      # across platforms (mirrors enrahitu's proven approach).
      - name: Inject platform optionalDependencies into the meta manifest
        if: matrix.publish_meta
        run: |
          node -e "const fs=require('fs');const f='addon/hiqlite-native/package.json';const p=JSON.parse(fs.readFileSync(f));const v=p.version;p.optionalDependencies={'@statecrafting/hiqlite-native-darwin-arm64':v,'@statecrafting/hiqlite-native-linux-x64-gnu':v,'@statecrafting/hiqlite-native-linux-arm64-gnu':v};fs.writeFileSync(f,JSON.stringify(p,null,2)+'\n')"
      - name: Publish @statecrafting/hiqlite-native (meta)
        if: matrix.publish_meta
        working-directory: addon/hiqlite-native
        # Idempotent: skip if this exact version is already on npm (spec 003).
        run: |
          pkg=$(node -p "require('./package.json').name")
          ver=$(node -p "require('./package.json').version")
          if npm view "$pkg@$ver" version 2>/dev/null | grep -q .; then
            echo "$pkg@$ver already on npm; skipping publish"
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # --- kernel-native addon -> @statecrafting/kernel-native-<triple> ------
      # (spec 004) napi-rs addon, same shape as hiqlite-native; the `napi`
      # feature is passed by the package's own build script.
      - run: npm --prefix addon/kernel-native ci
      - name: Build kernel-native addon
        run: npm --prefix addon/kernel-native run build
      - name: Assemble the kernel addon platform package
        run: |
          npm --prefix addon/kernel-native run create-npm-dirs
          cp addon/kernel-native/kernel-native.${{ matrix.napi_triple }}.node \
             addon/kernel-native/npm/${{ matrix.napi_triple }}/
          # npm always ships a LICENSE file even if absent from `files`.
          cp addon/kernel-native/LICENSE \
             addon/kernel-native/npm/${{ matrix.napi_triple }}/
      - name: Publish @statecrafting/kernel-native-${{ matrix.napi_triple }}
        working-directory: addon/kernel-native/npm/${{ matrix.napi_triple }}
        # Idempotent: skip if this exact version is already on npm (spec 004).
        run: |
          pkg=$(node -p "require('./package.json').name")
          ver=$(node -p "require('./package.json').version")
          if npm view "$pkg@$ver" version 2>/dev/null | grep -q .; then
            echo "$pkg@$ver already on npm; skipping publish"
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # --- kernel-native meta package (one leg only) ------------------------
      # The platform optionalDependencies are injected at publish time, not
      # committed, so addon/kernel-native/package-lock.json stays stable
      # across platforms (mirrors hiqlite-native).
      - name: Inject platform optionalDependencies into the kernel meta manifest
        if: matrix.publish_meta
        run: |
          node -e "const fs=require('fs');const f='addon/kernel-native/package.json';const p=JSON.parse(fs.readFileSync(f));const v=p.version;p.optionalDependencies={'@statecrafting/kernel-native-darwin-arm64':v,'@statecrafting/kernel-native-linux-x64-gnu':v,'@statecrafting/kernel-native-linux-arm64-gnu':v};fs.writeFileSync(f,JSON.stringify(p,null,2)+'\n')"
      - name: Publish @statecrafting/kernel-native (meta)
        if: matrix.publish_meta
        working-directory: addon/kernel-native
        # Idempotent: skip if this exact version is already on npm (spec 004).
        run: |
          pkg=$(node -p "require('./package.json').name")
          ver=$(node -p "require('./package.json').version")
          if npm view "$pkg@$ver" version 2>/dev/null | grep -q .; then
            echo "$pkg@$ver already on npm; skipping publish"
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
